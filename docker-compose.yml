services:
  catcher:
    build:
      context: .
    image: obs-chat-bot:dev
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-m", "obs_chat_bot", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
